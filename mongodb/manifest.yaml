apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    tier: db
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      tier: db
      env: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        tier: db
        env: dev
    spec:
      containers:
      - name: mongodb
        image: shanmukhatadisetti/mongodb:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    project: roboshop
    component: mongodb
    tier: db
    env: dev
spec:
  selector:
    project: roboshop
    component: mongodb
    tier: db
    env: dev
  ports:
  - protocol: TCP 
    port: 27017
    targetPort: 27017

