apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: frontend
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: frontend
      tier: frontend
      env: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: frontend
        tier: frontend
        env: dev
    spec:
      containers:
      - name: frontend
        image: shanmukhatadisetti/frontend:v1
        imagePullPolicy: Always
        ports:
        - name: frontend
          containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 1
          periodSeconds: 25
        readinessProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 1
          periodSeconds: 25
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: frontend
    env: dev
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    tier: frontend
    env: dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
