apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    tier: db
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      tier: db
      env: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: mysql
        tier: db
        env: dev
    spec:
      containers:
      - name: mysql
        image: shanmukhatadisetti/mysql:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    project: roboshop
    component: mysql
    tier: db
    env: dev
spec:
  selector:
    project: roboshop
    component: mysql
    tier: db
    env: dev
  ports:
  - protocol: TCP 
    port: 3306
    targetPort: 3306

