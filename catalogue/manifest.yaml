apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    tier: backend
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
      env: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: catalogue
        tier: backend
        env: dev
    spec:
      containers:
      - name: catalogue
        image: shanmukhatadisetti/catalogue:v1
        imagePullPolicy: Always
        ports:
        - name: catalogue
          containerPort: 8080
        livenessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 1
        periodSeconds: 15
        readinessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 1
        periodSeconds: 15