apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: db
      env: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: redis
        tier: db
        env: dev
    spec:
      containers:
      - name: redis
        image: redis:7.0
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    project: roboshop
    component: redis
    tier: db
    env: dev
spec:
  selector:
    project: roboshop
    component: redis
    tier: db
    env: dev
  ports:
  - protocol: TCP 
    port: 6379
    targetPort: 6379

