apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    component: rabbitmq
    project: roboshop
    env: dev 
    tier: database
type: opaque 
data:
  RABBITMQ_DEFAULT_USER: "cm9ib3Nob3A="
  RABBITMQ_DEFAULT_PASS: "cm9ib3Nob3AxMjM="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    component: rabbitmq
    tier: db
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: rabbitmq
      tier: db
      env: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: rabbitmq
        tier: db
        env: dev
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        imagePullPolicy: Always
        envFrom:
        - secretRef:
          name: rabbitmq
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    project: roboshop
    component: rabbitmq
    tier: db
    env: dev
spec:
  selector:
    project: roboshop
    component: rabbitmq
    tier: db
    env: dev
  ports:
  - protocol: TCP 
    port: 5672
    targetPort: 5672

